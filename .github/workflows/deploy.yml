name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run build
        env:
          VITE_AUTH_MODE: ${{ vars.VITE_AUTH_MODE }}
          VITE_MICROSOFT_CLIENT_ID: ${{ secrets.VITE_MICROSOFT_CLIENT_ID }}
          VITE_MICROSOFT_TENANT_ID: ${{ secrets.VITE_MICROSOFT_TENANT_ID }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist/
          retention-days: 3

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  deploy-frontend:
    name: Deploy Frontend
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # Sync assets with long cache (hashed filenames)
      - run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.json"

      # Upload index.html with no-cache (always fresh)
      - run: |
          aws s3 cp dist/index.html s3://${{ vars.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      # Invalidate CloudFront cache
      - run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html"

  deploy-backend:
    name: Deploy Backend
    needs: build-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - run: npm run build
      - run: npx sls deploy --stage dev
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          MICROSOFT_CLIENT_ID: ${{ secrets.VITE_MICROSOFT_CLIENT_ID }}
          MIGRATE_SECRET: ${{ secrets.MIGRATE_SECRET }}
          VPC_SECURITY_GROUP_ID: ${{ secrets.VPC_SECURITY_GROUP_ID }}
          VPC_SUBNET_ID_1: ${{ secrets.VPC_SUBNET_ID_1 }}
          VPC_SUBNET_ID_2: ${{ secrets.VPC_SUBNET_ID_2 }}
          VPC_SUBNET_ID_3: ${{ secrets.VPC_SUBNET_ID_3 }}

      - name: Aplicar migraciones de auth (sessions + usuario de prueba)
        run: |
          API_URL="${API_BASE_URL:-https://energymonitor.click}"
          sleep 10
          ok=0
          for i in 1 2 3; do
            if [ -n "${{ secrets.MIGRATE_SECRET }}" ]; then
              out=$(curl -s -w "\n%{http_code}" -X POST -H "X-Migrate-Secret: ${{ secrets.MIGRATE_SECRET }}" "$API_URL/api/db-verify/apply-auth-migrations") || true
            else
              out=$(curl -s -w "\n%{http_code}" -X POST "$API_URL/api/db-verify/apply-auth-migrations") || true
            fi
            body=$(echo "$out" | head -n -1)
            code=$(echo "$out" | tail -n1)
            echo "HTTP $code - $body"
            if [ "$code" = "200" ] || [ "$code" = "201" ]; then ok=1; break; fi
            [ $i -lt 3 ] && sleep 15
          done
          [ "$ok" = "1" ] || exit 1
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
