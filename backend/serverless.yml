service: power-digital-api

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  memorySize: 256
  timeout: 10
  # CORS en API Gateway (preflight OPTIONS); debe coincidir con enableCors en Nest (serverless.ts)
  httpApi:
    cors:
      allowedOrigins:
        - https://energymonitor.click
        - http://localhost:5173
        - http://127.0.0.1:5173
      allowedHeaders:
        - Content-Type
        - Authorization
        - Accept
        - X-Requested-With
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowCredentials: true
  iam:
    role:
      statements:
        - Effect: Allow
          Action: secretsmanager:GetSecretValue
          Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:energy-monitor/*'
        - Effect: Allow
          Action: lambda:InvokeFunction
          Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:billing-pdf-generator'
  environment:
    DB_HOST: ${env:DB_HOST, 'localhost'}
    DB_PORT: ${env:DB_PORT, '5432'}
    DB_NAME: ${env:DB_NAME, 'energy_monitor'}
    DB_USERNAME: ${env:DB_USERNAME, 'postgres'}
    DB_PASSWORD: ${env:DB_PASSWORD, ''}
    GOOGLE_CLIENT_ID: ${env:GOOGLE_CLIENT_ID, ''}
    MICROSOFT_CLIENT_ID: ${env:MICROSOFT_CLIENT_ID, ''}
    MIGRATE_SECRET: ${env:MIGRATE_SECRET, ''}
    NODE_ENV: production
    READINGS_SOURCE: staging
  vpc:
    securityGroupIds:
      - ${env:VPC_SECURITY_GROUP_ID}
    subnetIds:
      - ${env:VPC_SUBNET_ID_1}
      - ${env:VPC_SUBNET_ID_2}
      - ${env:VPC_SUBNET_ID_3}

functions:
  api:
    handler: dist/serverless.handler
    memorySize: 1024
    timeout: 30
    events:
      - httpApi:
          method: '*'
          path: /api/{proxy+}
      - httpApi:
          method: '*'
          path: /api
  offlineAlerts:
    handler: dist/offline-alerts.handler
    timeout: 30
    events:
      - schedule:
          rate: rate(5 minutes)
          enabled: true
  dbVerify:
    handler: dist/db-verify-lambda.handler
    description: Verificación RDS (conteos, distribución). Invocar con AWS CLI. Credenciales por env o Secrets Manager.

package:
  patterns:
    - certs/**

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 4000
    noPrependStageInUrl: true
