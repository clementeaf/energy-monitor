service: power-digital-api

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  memorySize: 256
  timeout: 10
  environment:
    DB_HOST: ${env:DB_HOST, 'localhost'}
    DB_PORT: ${env:DB_PORT, '5432'}
    DB_NAME: ${env:DB_NAME, 'energy_monitor'}
    DB_USERNAME: ${env:DB_USERNAME, 'postgres'}
    DB_PASSWORD: ${env:DB_PASSWORD, ''}
    GOOGLE_CLIENT_ID: ${env:GOOGLE_CLIENT_ID, ''}
    MICROSOFT_CLIENT_ID: ${env:MICROSOFT_CLIENT_ID, ''}
    NODE_ENV: production
  vpc:
    securityGroupIds:
      - ${env:VPC_SECURITY_GROUP_ID}
    subnetIds:
      - ${env:VPC_SUBNET_ID_1}
      - ${env:VPC_SUBNET_ID_2}
      - ${env:VPC_SUBNET_ID_3}

functions:
  api:
    handler: dist/serverless.handler
    events:
      - httpApi:
          method: '*'
          path: /api/{proxy+}
      - httpApi:
          method: '*'
          path: /api
  offlineAlerts:
    handler: dist/offline-alerts.handler
    timeout: 30
    events:
      - schedule:
          rate: rate(5 minutes)
          enabled: true

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 4000
    noPrependStageInUrl: true
