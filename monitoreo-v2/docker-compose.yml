services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: monitoreo-v2-db
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: ${DB_NAME:-monitoreo_v2}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-monitoreo2026}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monitoreo-v2-api
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-monitoreo_v2}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-monitoreo2026}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID}
      COOKIE_SECRET: ${COOKIE_SECRET:-dev-cookie-secret-change-in-prod}
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  timescaledb_data:
