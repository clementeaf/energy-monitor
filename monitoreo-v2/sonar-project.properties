sonar.projectKey=energy-monitor-v2
sonar.projectName=Energy Monitor V2
sonar.projectVersion=0.99.1

# Sources (no sonar.language — let SonarQube auto-detect TS/JS)
sonar.sources=backend/src,frontend/src
sonar.tests=backend/src,frontend/src,frontend/vite
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.test.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**

# Encoding
sonar.sourceEncoding=UTF-8

# TypeScript config (stripped for SonarQube compatibility)
sonar.typescript.tsconfigPaths=tsconfig.sonar.json

# Coverage (lcov)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov-fixed.info,frontend/coverage/lcov-fixed.info

# Coverage exclusions
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/*.test.tsx,**/types/**,**/dto/**,**/*.entity.ts,**/main.ts,**/app.module.ts,**/*.config.ts

# Duplication exclusions
sonar.cpd.exclusions=**/*.spec.ts,**/*.test.ts,**/*.test.tsx

# Host
sonar.host.url=http://localhost:9000
sonar.token=squ_1266a98ac21e6229aca63870b2e86901b3bb46be
